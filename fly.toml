app = "edgescape"
primary_region = "lhr"

[build]

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "edgescape_data"
  destination = "/opt/server/data/players"
